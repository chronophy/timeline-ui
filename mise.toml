[tools]
# Pinned to the newest swift.org public release (6.3.3) satisfying Package.swift's
# swift-tools-version:6.2 minimum. Bump when a newer release is published on swift.org.
swift = "6.3.3"

[tasks.format]
description = "Format Swift source files"
run = "swift format --in-place --recursive --parallel ./Sources ./Tests"

[tasks.lint]
description = "Check formatting without writing anything (what CI runs)"
run = "swift format lint --recursive --strict --parallel ./Sources ./Tests"

[tasks.build]
description = "Build the Swift package"
run = "swift build"

[tasks.tests]
description = "Run package unit tests"
run = "swift test"

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean"

[tasks.previews]
description = "Generate preview PNG images"
run = "swift run RenderPreviews"
